# Watchdog — runs every 5m and ticks only if the last tick is stale (>14m).
# Catches gaps if the long-running daemon is delayed or restarting.

name: Tick Race Watchdog

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: race-tick-watchdog
  cancel-in-progress: false

jobs:
  ensure-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run ensure-race-tick
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Vercel cron tick (backup)
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "CRON_SECRET not set — skipping Vercel cron backup"
            exit 0
          fi
          curl -sfS -m 120 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://b3s.makeawesome.com/api/cron/tick-race"
